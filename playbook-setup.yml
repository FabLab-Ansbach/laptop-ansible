- name: "DPKG Update"
  hosts: laptops
  tasks:
    - name: "Set apt-cacher-ng"
      ansible.builtin.copy:
        content: "Acquire::http::Proxy \"http://172.16.16.12:3142\";"
        dest: "/etc/apt/apt.conf.d/00aptproxy"
        owner: root
        group: root
        mode: 0755
  roles:
   - packages
   - serial-base
   - platform-io
