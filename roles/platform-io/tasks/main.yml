---
# tasks file for platform-io
- name: "Install VSCode"
  ansible.builtin.apt:
    name: code
    state: present
- name: "Install python3-venv"
  ansible.builtin.apt:
    name: python3-venv
    state: present
- name: "Install PlatformIO for user: user"
  ansible.builtin.command:
    cmd: "sudo -u user code --install-extension platformio.platformio-ide"
- name: "Install PlatformIO for user: laptop"
  ansible.builtin.command:
    cmd: "sudo -u laptop code --install-extension platformio.platformio-ide"
- name: "Install udev rules"
  ansible.builtin.copy:
    src: 99-platformio-udev.rules
    dest: /etc/udev/rules.d/99-platformio-udev.rules
    owner: root
    group: root
    mode: 0755
- name: "Reload udev"
  ansible.builtin.systemd_service:
    name: "udev"
    state: "reloaded"
